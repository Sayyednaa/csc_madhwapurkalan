<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="100%" height="100%">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0052D4" />
      <stop offset="100%" stop-color="#4364F7" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6FB1FC" />
      <stop offset="100%" stop-color="#4364F7" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#11998e" />
      <stop offset="100%" stop-color="#38ef7d" />
    </linearGradient>
  </defs>

  <!-- Background Canvas (Optional/Transparent) -->
  <rect width="100%" height="100%" fill="none"/>

  <!-- LOGO ICON -->
  <g transform="translate(10, 0)">
    <!-- Outer Tech Ring -->
    <circle cx="100" cy="100" r="75" fill="none" stroke="url(#blueGrad)" stroke-width="6" stroke-dasharray="10 5" />
    
    <!-- Inner Shield/Globe for Trust -->
    <circle cx="100" cy="100" r="55" fill="none" stroke="url(#accentGrad)" stroke-width="4" />
    
    <!-- Digital Nodes / Connecting Dots -->
    <circle cx="100" cy="25" r="7" fill="url(#blueGrad)" />
    <circle cx="175" cy="100" r="7" fill="url(#accentGrad)" />
    <circle cx="100" cy="175" r="7" fill="url(#blueGrad)" />
    <circle cx="25" cy="100" r="7" fill="url(#accentGrad)" />
    
    <!-- Center Growth Leaf & Mouse Click Symbol -->
    <path d="M100,60 C125,60 140,85 100,135 C60,85 75,60 100,60 Z" fill="url(#blueGrad)" opacity="0.15"/>
    <path d="M100,70 C118,70 128,90 100,125 C72,90 82,70 100,70 Z" fill="url(#accentGrad)" />
    <line x1="100" y1="90" x2="100" y2="125" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- TYPOGRAPHY -->
  <!-- "CSC" Main Text -->
  <text x="210" y="95" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="900" fill="url(#blueGrad)" letter-spacing="2">CSC</text>
  
  <!-- "MADHWAPUR KALAN" Sub Text -->
  <text x="212" y="135" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#333333" letter-spacing="4">MADHWAPUR KALAN</text>
  
  <!-- Tagline / Core Service Indicator -->
  <text x="212" y="160" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="600" fill="#777777" letter-spacing="1">DIGITAL SERVICE CENTRE</text>

  <!-- Decorative Separator Line -->
  <line x1="212" y1="110" x2="550" y2="110" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round" />
</svg>
